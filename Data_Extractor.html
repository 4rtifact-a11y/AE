<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur de fichiers texte</title>
    <!-- Importation de Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Dézoom global de la page à 75% */
        html {
            zoom: 0.75;
        }

        /* Personnalisation de la barre de défilement pour les longs textes */
        pre::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        pre::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 4px;
        }
        pre::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        pre::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen p-4 md:p-8 text-gray-100 font-sans">
    <div class="w-full max-w-[1600px] mx-auto">
        <!-- En-tête de la page -->
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-purple-400 mb-4 tracking-tight">Lecteur .txt</h1>
            <p class="text-gray-400 text-lg">Importez vos fichiers texte pour lire leur contenu directement ici.</p>
        </header>

        <!-- Zone d'importation des fichiers -->
        <div class="max-w-4xl mx-auto mb-12">
            <section class="bg-gray-800 p-8 md:p-12 rounded-2xl shadow-lg flex flex-col items-center justify-center border-2 border-dashed border-gray-600 hover:border-purple-500 hover:bg-gray-800/80 transition-all duration-300 group">
                <label for="fileInput" class="cursor-pointer flex flex-col items-center text-center w-full">
                    <div class="bg-gray-700 p-4 rounded-full mb-4 group-hover:bg-gray-600 transition-colors duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                    </div>
                    <span class="text-xl font-semibold text-gray-200 mb-2 group-hover:text-purple-400">Cliquez pour sélectionner des fichiers</span>
                    <span class="text-sm text-gray-500">ou glissez-déposez ici (Format .txt uniquement)</span>
                    <!-- Input caché, on utilise le label pour cliquer -->
                    <input type="file" id="fileInput" accept=".txt, text/plain" multiple class="hidden">
                </label>
            </section>
        </div>

        <!-- Conteneur où apparaîtront les blocs de fichiers (Grille étendue) -->
        <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-6 xl:gap-8">
            <!-- Le JavaScript injectera les éléments ici -->
        </div>
    </div>

    <!-- Script de gestion de l'importation et de la lecture -->
    <script>
        const fileInput = document.getElementById('fileInput');
        const resultsContainer = document.getElementById('resultsContainer');
        
        // État global pour stocker les fichiers et les notes
        let uploadedFilesData = [];
        let idCounter = 0;

        // Écouteur d'événement sur l'importation de fichiers
        fileInput.addEventListener('change', handleFiles);

        // Fonction pour extraire le score (ex: "Total: 14/16", "Score: 12", "15 points")
        function extractScore(content) {
            let match = content.match(/(?:score|total|note)[\s\S]{0,15}?(\d+)(?:\s*\/\s*16|\s*points?)?/i);
            if (!match) {
                match = content.match(/(\d+)\s*(?:\/\s*16|points?|pts?)/i);
            }
            if (match && match[1]) {
                const score = parseInt(match[1], 10);
                return Math.min(Math.max(score, 0), 16); // Garantir que c'est entre 0 et 16
            }
            return 0; // 0 par défaut si aucune note n'est trouvée
        }

        // Fonction pour obtenir le niveau en fonction du score
        function getLevelInfo(score) {
            if (score === 0) return { text: "À initier", color: "text-gray-400 bg-gray-700/50 border-gray-600" };
            if (score >= 1 && score <= 4) return { text: "Apprenti Débutant 🌱", color: "text-green-400 bg-green-900/30 border-green-800" };
            if (score >= 5 && score <= 9) return { text: "Motion Designer Junior 🚀", color: "text-blue-400 bg-blue-900/30 border-blue-800" };
            if (score >= 10 && score <= 14) return { text: "Animateur Confirmé 🔥", color: "text-orange-400 bg-orange-900/30 border-orange-800" };
            if (score >= 15 && score <= 16) return { text: "Maître de l'Animation 👑", color: "text-yellow-400 bg-yellow-900/30 border-yellow-700 shadow-[0_0_15px_rgba(250,204,21,0.2)]" };
            return { text: "Non évalué", color: "text-gray-400 bg-gray-700/50 border-gray-600" };
        }

        function handleFiles(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                if (!file.name.toLowerCase().endsWith('.txt') && file.type !== "text/plain") {
                    uploadedFilesData.push({ id: idCounter++, title: file.name, content: "Erreur : Ce fichier ne semble pas être un fichier texte (.txt).", score: -1, isError: true });
                    renderFiles();
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    const score = extractScore(content); // Récupérer la note
                    
                    // Stocker les infos dans l'état global
                    uploadedFilesData.push({ id: idCounter++, title: file.name, content: content, score: score, isError: false });
                    renderFiles(); // Mettre à jour l'affichage
                };
                reader.onerror = function() {
                    uploadedFilesData.push({ id: idCounter++, title: file.name, content: "Une erreur est survenue lors de la lecture du fichier.", score: -1, isError: true });
                    renderFiles();
                };
                reader.readAsText(file);
            });
            
            fileInput.value = '';
        }

        // Supprimer un fichier spécifique et recharger la liste
        function removeFile(id) {
            uploadedFilesData = uploadedFilesData.filter(f => f.id !== id);
            renderFiles();
        }

        // Fonction d'affichage trié
        function renderFiles() {
            // Tri décroissant selon le score
            uploadedFilesData.sort((a, b) => b.score - a.score);
            
            resultsContainer.innerHTML = ''; // Nettoyer le conteneur avant de re-dessiner
            
            uploadedFilesData.forEach(fileData => {
                const isError = fileData.isError;
                const levelInfo = isError ? {text: "Erreur", color: "text-red-400 bg-red-900/30 border-red-800"} : getLevelInfo(fileData.score);
                
                const block = document.createElement('article');
                block.className = 'bg-gray-800 rounded-2xl shadow-lg border border-gray-700 overflow-hidden flex flex-col transition-all duration-300 hover:shadow-xl hover:-translate-y-1 h-full max-h-[500px]';

                const header = document.createElement('header');
                header.className = 'bg-gray-900/50 border-b border-gray-700 px-6 py-4 flex flex-col gap-3 sticky top-0';
                
                // Ligne du titre et bouton fermer
                const titleRow = document.createElement('div');
                titleRow.className = 'flex items-center justify-between w-full';
                
                const titleEl = document.createElement('h2');
                titleEl.className = 'text-lg font-bold text-gray-100 truncate flex items-center gap-3';
                titleEl.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ${isError ? 'text-red-400' : 'text-purple-400'} flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <span class="truncate" title="${fileData.title}">${fileData.title}</span>
                `;
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'p-1 text-gray-400 hover:text-red-400 hover:bg-gray-700 rounded-lg transition-colors ml-4';
                closeBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                `;
                closeBtn.onclick = () => {
                    block.classList.add('opacity-0', 'scale-95');
                    setTimeout(() => removeFile(fileData.id), 200);
                };

                titleRow.appendChild(titleEl);
                titleRow.appendChild(closeBtn);

                // Badge du classement en dessous du titre
                const badgeRow = document.createElement('div');
                if (!isError) {
                    badgeRow.innerHTML = `
                        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md border ${levelInfo.color} text-sm font-semibold tracking-wide w-fit">
                            <span>${fileData.score}/16</span>
                            <span class="opacity-50">|</span>
                            <span>${levelInfo.text}</span>
                        </div>
                    `;
                }

                header.appendChild(titleRow);
                if (!isError) header.appendChild(badgeRow);

                // Contenu du texte
                const body = document.createElement('div');
                body.className = 'p-6 flex-grow bg-gray-800 overflow-auto';
                
                const contentEl = document.createElement('pre');
                contentEl.className = `whitespace-pre-wrap font-mono text-sm leading-relaxed ${isError ? 'text-red-400 font-semibold' : 'text-gray-300'}`;
                contentEl.textContent = fileData.content;

                body.appendChild(contentEl);

                block.appendChild(header);
                block.appendChild(body);
                
                resultsContainer.appendChild(block);
            });
        }
    </script>
</body>
</html>
